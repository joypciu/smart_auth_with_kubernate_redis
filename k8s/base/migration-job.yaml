apiVersion: batch/v1
kind: Job
metadata:
  name: smart-auth-migration
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do echo waiting for postgres; sleep 2; done
          envFrom:
            - configMapRef:
                name: smart-auth-config
            - secretRef:
                name: smart-auth-secrets
      containers:
        - name: migration
          image: smart-auth-api:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: smart-auth-config
            - secretRef:
                name: smart-auth-secrets
