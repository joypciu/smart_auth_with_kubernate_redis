apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-auth-ingress
spec:
  rules:
    - host: auth.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smart-auth-api
                port:
                  number: 80
