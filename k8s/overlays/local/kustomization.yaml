apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smart-auth

resources:
  - ../../base

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: smart-auth-config
    envs:
      - config.env

secretGenerator:
  - name: smart-auth-secrets
    envs:
      - secrets.env

images:
  - name: smart-auth-api
    newName: smart-auth-api
    newTag: latest

patches:
  - path: ingress-patch.yaml
  - path: api-patch.yaml
